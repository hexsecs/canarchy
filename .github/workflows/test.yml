name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    name: unittest (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync project environment
        run: uv sync

      - name: Run test suite
        # pytest is used (not `unittest discover`) so module-level
        # function-style tests in tests/test_mcp.py and
        # tests/test_dbc_runtime.py are collected. `unittest discover`
        # silently skips them.
        run: uv run pytest tests/ -q

  windows-smoke:
    name: windows smoke (python 3.12)
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync project environment
        run: uv sync

      - name: Run Windows install smoke
        shell: pwsh
        run: |
          uv run canarchy doctor --text
          $env:CANARCHY_TRANSPORT_BACKEND = "scaffold"
          uv run canarchy capture can0 --jsonl
          uv run canarchy config show --json

      - name: Run Windows-safe CLI tests
        shell: pwsh
        run: uv run pytest tests/test_cli.py::DoctorCommandTests tests/test_cli.py::CliTests::test_capture_json_output_streams_one_event_per_line -q
