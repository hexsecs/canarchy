[project]
name = "canarchy"
version = "0.1.0"
description = "CLI-first CAN security research toolkit"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
  { name = "hexsecs" },
]
dependencies = [
    "cantools>=41.3.0",
]

[project.scripts]
canarchy = "canarchy.cli:main"

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.ruff]
line-length = 100
